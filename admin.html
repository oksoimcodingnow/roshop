<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoShop Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff3860;
      --bg: #f7f6fb;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #666680;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
    }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { font-size: 20px; font-weight: 900; color: var(--red); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 1rem; font-size: 14px; color: var(--muted); }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
    }
    .logout-btn:hover { background: var(--bg); }

    /* AUTH GATE */
    .auth-gate {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .auth-box {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
    }
    .auth-box h2 { font-size: 22px; font-weight: 900; }
    .auth-box p { font-size: 14px; color: var(--muted); }
    .auth-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
    }
    .auth-input:focus { outline: none; border-color: var(--red); }
    .auth-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }
    .auth-error { color: var(--red); font-size: 13px; min-height: 18px; }

    /* MAIN */
    .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-title { font-size: 26px; font-weight: 900; margin-bottom: 1.5rem; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.25rem;
      border: 1px solid var(--border);
    }
    .stat-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 900; }

    /* FILTERS */
    .filter-row { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
    }
    .filter-btn.active { background: var(--red); color: white; border-color: var(--red); }

    /* ORDERS TABLE */
    .orders-list { display: flex; flex-direction: column; gap: 1rem; }
    .order-card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
    }
    .order-meta { display: flex; flex-direction: column; gap: 6px; }
    .order-id { font-size: 11px; color: var(--muted); font-weight: 700; }
    .order-email { font-size: 15px; font-weight: 800; }
    .order-items { font-size: 13px; color: var(--muted); }
    .order-footer { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .order-total { font-size: 15px; font-weight: 900; color: var(--red); }
    .order-payment { font-size: 12px; background: var(--bg); padding: 4px 10px; border-radius: 20px; font-weight: 700; }
    .order-date { font-size: 12px; color: var(--muted); }
    .status-badge {
      font-size: 12px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .status-pending  { background: #fff3cd; color: #856404; }
    .status-delivered { background: #d1e7dd; color: #0a3622; }

    /* ACTION BUTTONS */
    .order-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .btn-deliver {
      background: #00b06f;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-deliver:hover { background: #009960; }
    .btn-deliver:disabled { background: #ccc; cursor: default; }
    .btn-slip {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
    }
    .btn-slip:hover { background: var(--bg); }

    /* SLIP LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      font-weight: 900;
    }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: 15px; font-weight: 700; }

    /* LOADING */
    .spinner { width: 36px; height: 36px; border: 4px solid rgba(255,56,96,0.15); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TABS */
    .tab-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab-btn { padding: 9px 20px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; color: var(--text); }
    .tab-btn.active { background: var(--red); color: white; border-color: var(--red); }

    /* ITEM IMAGE CARDS */
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .item-img-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
    .item-thumb-admin { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 36px; border-radius: 12px; background: var(--bg); overflow: hidden; }
    .item-thumb-admin img { width: 100%; height: 100%; object-fit: contain; }
    .item-name-admin { font-size: 13px; font-weight: 800; }
    .item-cat-badge { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .upload-btn { background: var(--red); color: white; border: none; border-radius: 8px; padding: 6px 12px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; width: 100%; }
    .upload-btn:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>

  <!-- AUTH GATE -->
  <div class="auth-gate" id="auth-gate">
    <div class="auth-box">
      <div style="font-size:28px">🎮</div>
      <h2>Admin Login</h2>
      <p>RoShop staff only</p>
      <input type="email"    id="admin-email"    class="auth-input" placeholder="Email" />
      <input type="password" id="admin-password" class="auth-input" placeholder="Password" />
      <div class="auth-error" id="admin-error"></div>
      <button class="auth-btn" onclick="adminLogin()">Login</button>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">🎮 RoShop</a>
    <div class="nav-right">
      <span id="admin-email-display"></span>
      <button class="logout-btn" onclick="adminLogout()">Logout</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-orders" onclick="showTab('orders')">📋 Orders</button>
      <button class="tab-btn" id="tab-items" onclick="showTab('items')">🖼️ Item Images</button>
    </div>

    <div id="orders-section">
    <div class="page-title">📋 Orders</div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending" style="color:#856404">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-value" id="stat-delivered" style="color:#00b06f">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Revenue (USD)</div>
        <div class="stat-value" id="stat-revenue" style="color:var(--red)">—</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn"        onclick="setFilter('pending', this)">⏳ Pending</button>
      <button class="filter-btn"        onclick="setFilter('delivered', this)">✅ Delivered</button>
    </div>

    <!-- ORDERS -->
    <div class="orders-list" id="orders-list">
      <div class="spinner"></div>
    </div>
    </div><!-- end orders-section -->

    <!-- ITEMS SECTION -->
    <div id="items-section" style="display:none">
      <div class="page-title">🖼️ Item Images</div>
      <div class="items-grid" id="items-admin-grid"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- SLIP LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="Payment slip" />
  </div>

  <script>
    const ADMIN_EMAIL = 'hzdjdndb@gmail.com';
    let allOrders = [];
    let activeFilter = 'all';

    // ── AUTH ──
    auth.onAuthStateChanged(user => {
      if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('admin-email-display').textContent = user.email;
        loadOrders();
      } else if (user) {
        // Logged in but not admin
        auth.signOut();
        showError('Access denied. Admin only.');
      } else {
        document.getElementById('auth-gate').style.display = 'flex';
      }
    });

    function adminLogin() {
      const email    = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      clearError();
      auth.signInWithEmailAndPassword(email, password)
        .catch(err => showError('Invalid email or password.'));
    }

    function adminLogout() {
      auth.signOut();
    }

    function showError(msg) { document.getElementById('admin-error').textContent = msg; }
    function clearError()   { document.getElementById('admin-error').textContent = ''; }

    // ── ORDERS ──
    function loadOrders() {
      db.collection('orders').orderBy('createdAt', 'desc').get()
        .then(snapshot => {
          allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          updateStats();
          renderOrders();
        })
        .catch(err => {
          document.getElementById('orders-list').innerHTML = '<div class="empty">⚠️ Failed to load orders.</div>';
        });
    }

    function updateStats() {
      const pending   = allOrders.filter(o => o.status === 'pending').length;
      const delivered = allOrders.filter(o => o.status === 'delivered').length;
      const revenue   = allOrders.reduce((sum, o) => sum + (o.totalUsd || 0), 0);
      document.getElementById('stat-total').textContent     = allOrders.length;
      document.getElementById('stat-pending').textContent   = pending;
      document.getElementById('stat-delivered').textContent = delivered;
      document.getElementById('stat-revenue').textContent   = '$' + revenue.toFixed(2);
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      const filtered = activeFilter === 'all'
        ? allOrders
        : allOrders.filter(o => o.status === activeFilter);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">No orders found.</div>';
        return;
      }

      list.innerHTML = filtered.map(order => {
        const itemNames = (order.items || []).map(i => i.name).join(', ');
        const date = order.createdAt
          ? new Date(order.createdAt.seconds * 1000).toLocaleString()
          : '—';
        const isPending = order.status === 'pending';
        const slipBtn = order.slipUrl
          ? `<button class="btn-slip" onclick="viewSlip('${order.slipUrl}')">🧾 View Slip</button>`
          : '';

        return `
          <div class="order-card" id="order-${order.id}">
            <div class="order-meta">
              <div class="order-id">Order #${order.id}</div>
              <div class="order-email">${order.email || '—'}</div>
              <div class="order-items">${itemNames || '—'}</div>
              <div class="order-footer">
                <span class="order-total">$${(order.totalUsd || 0).toFixed(2)}</span>
                <span class="order-payment">${order.paymentMethod || '—'}</span>
                <span class="order-date">${date}</span>
                <span class="status-badge status-${order.status}">${order.status}</span>
              </div>
            </div>
            <div class="order-actions">
              <button class="btn-deliver" onclick="markDelivered('${order.id}')" ${!isPending ? 'disabled' : ''}>
                ${isPending ? '✅ Mark Delivered' : 'Delivered'}
              </button>
              ${slipBtn}
            </div>
          </div>
        `;
      }).join('');
    }

    function markDelivered(orderId) {
      db.collection('orders').doc(orderId).update({ status: 'delivered' })
        .then(() => {
          const order = allOrders.find(o => o.id === orderId);
          if (order) order.status = 'delivered';
          updateStats();
          renderOrders();
        })
        .catch(err => alert('Failed to update order.'));
    }

    // ── TABS ──
    function showTab(tab) {
      document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
      document.getElementById('tab-items').classList.toggle('active', tab === 'items');
      document.getElementById('orders-section').style.display = tab === 'orders' ? 'block' : 'none';
      document.getElementById('items-section').style.display  = tab === 'items'  ? 'block' : 'none';
      if (tab === 'items' && allItems.length === 0) loadItems();
    }

    // ── ITEM IMAGES ──
    const IMGBB_KEY = '2d6d609f359b972289194f24ecc6b285';
    let allItems = [];

    async function loadItems() {
      const grid = document.getElementById('items-admin-grid');
      grid.innerHTML = '<div class="spinner"></div>';
      const snap = await db.collection('items').get();
      allItems = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
      allItems.sort((a, b) => a.name.localeCompare(b.name));
      renderItemsAdmin();
    }

    function renderItemsAdmin() {
      const grid = document.getElementById('items-admin-grid');
      grid.innerHTML = allItems.map(item => `
        <div class="item-img-card" id="card-${item.docId}">
          <div class="item-thumb-admin">
            ${item.img ? `<img src="${item.img}" alt="${item.name}" />` : `<span>${item.emoji || '📦'}</span>`}
          </div>
          <div class="item-name-admin">${item.name}</div>
          <div class="item-cat-badge">${item.cat || item.game}</div>
          <input type="file" accept="image/*" style="display:none"
            id="file-${item.docId}"
            onchange="handleImageUpload(this, '${item.docId}')" />
          <button class="upload-btn" onclick="document.getElementById('file-${item.docId}').click()">
            ${item.img ? '🔄 Change' : '📷 Add Image'}
          </button>
        </div>
      `).join('');
    }

    async function handleImageUpload(input, docId) {
      const file = input.files[0];
      if (!file) return;
      const card = document.getElementById('card-' + docId);
      const btn  = card.querySelector('.upload-btn');
      btn.textContent = 'Uploading...';
      btn.disabled = true;
      try {
        const base64 = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload  = e => res(e.target.result.split(',')[1]);
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });
        const form = new FormData();
        form.append('key', IMGBB_KEY);
        form.append('image', base64);
        const resp = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
        const data = await resp.json();
        if (!data.success) throw new Error('ImgBB upload failed');
        const url = data.data.url;
        await db.collection('items').doc(docId).update({ img: url });
        const item = allItems.find(i => i.docId === docId);
        if (item) item.img = url;
        card.querySelector('.item-thumb-admin').innerHTML = `<img src="${url}" alt="" />`;
        btn.textContent = '✅ Done!';
        setTimeout(() => { btn.textContent = '🔄 Change'; btn.disabled = false; }, 2000);
      } catch(err) {
        btn.textContent = '❌ Failed';
        btn.disabled = false;
      }
    }

    // ── SLIP LIGHTBOX ──
    function viewSlip(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
  </script>
</body>
</html>
