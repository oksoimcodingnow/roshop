<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — RoShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff3860;
      --bg: #f7f6fb;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #666680;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
    }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* AUTH GATE */
    .auth-gate {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .auth-box {
      background: white; border-radius: 24px; padding: 2rem;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 1rem; text-align: center;
    }
    .auth-box h2 { font-size: 22px; font-weight: 900; }
    .auth-box p  { font-size: 14px; color: var(--muted); }
    .auth-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-family: 'Nunito', sans-serif; font-size: 15px;
    }
    .auth-input:focus { outline: none; border-color: var(--red); }
    .auth-btn {
      background: var(--red); color: white; border: none;
      border-radius: 12px; padding: 13px;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer;
    }
    .auth-error { color: var(--red); font-size: 13px; min-height: 18px; }

    /* NAV */
    nav {
      background: white; border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 20px; font-weight: 900; color: var(--red); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 1rem; font-size: 14px; color: var(--muted); }
    .back-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-family: 'Nunito', sans-serif; font-weight: 700;
      cursor: pointer; color: var(--text); text-decoration: none; font-size: 14px;
    }
    .back-btn:hover { background: var(--bg); }
    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-family: 'Nunito', sans-serif; font-weight: 700;
      cursor: pointer; color: var(--text);
    }

    /* MAIN */
    .main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-title { font-size: 26px; font-weight: 900; margin-bottom: 1.5rem; }

    /* ORDER CARDS */
    .orders-list { display: flex; flex-direction: column; gap: 1rem; }
    .order-card {
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border); padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 10px;
    }
    .order-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .order-id   { font-size: 12px; color: var(--muted); font-weight: 700; }
    .order-date { font-size: 12px; color: var(--muted); }
    .status-badge {
      font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 20px;
    }
    .status-pending   { background: #fff3cd; color: #856404; }
    .status-delivered { background: #d1e7dd; color: #0a3622; }

    .order-items { display: flex; flex-direction: column; gap: 6px; }
    .order-item-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .order-item-row:last-child { border-bottom: none; }
    .item-name  { font-weight: 700; }
    .item-price { color: var(--red); font-weight: 800; }

    .order-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 8px; flex-wrap: wrap; gap: 8px;
    }
    .order-payment { font-size: 13px; color: var(--muted); font-weight: 700; }
    .order-total   { font-size: 17px; font-weight: 900; color: var(--red); }

    /* EMPTY / LOADING */
    .empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: 15px; font-weight: 700; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(255,56,96,0.15); border-top-color: var(--red);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- AUTH GATE -->
  <div class="auth-gate" id="auth-gate">
    <div class="auth-box">
      <div style="font-size:28px">🎮</div>
      <h2>Login to view orders</h2>
      <p>Sign in to see your order history</p>
      <input type="email"    id="login-email"    class="auth-input" placeholder="Email" />
      <input type="password" id="login-password" class="auth-input" placeholder="Password" />
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" onclick="doLogin()">Login</button>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">🎮 RoShop</a>
    <div class="nav-right">
      <a class="back-btn" href="index.html">← Back to Shop</a>
      <span id="user-email-display"></span>
      <button class="logout-btn" onclick="auth.signOut()">Logout</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="page-title">📦 My Orders</div>
    <div class="orders-list" id="orders-list">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('user-email-display').textContent = user.email;
        loadOrders(user.uid);
      } else {
        document.getElementById('auth-gate').style.display = 'flex';
      }
    });

    function doLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      document.getElementById('login-error').textContent = '';
      auth.signInWithEmailAndPassword(email, password)
        .catch(() => { document.getElementById('login-error').textContent = 'Invalid email or password.'; });
    }

    function loadOrders(uid) {
      db.collection('orders')
        .where('userId', '==', uid)
        .orderBy('createdAt', 'desc')
        .get()
        .then(snapshot => {
          const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderOrders(orders);
        })
        .catch(err => {
          document.getElementById('orders-list').innerHTML = '<div class="empty">⚠️ Failed to load orders.</div>';
        });
    }

    function renderOrders(orders) {
      const list = document.getElementById('orders-list');
      if (orders.length === 0) {
        list.innerHTML = '<div class="empty">📭 No orders yet. Go shop something!</div>';
        return;
      }

      list.innerHTML = orders.map(order => {
        const date = order.createdAt
          ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
          : '—';
        const itemRows = (order.items || []).map(item => `
          <div class="order-item-row">
            <span class="item-name">${item.emoji || ''} ${item.name}</span>
            <span class="item-price">$${(item.price || 0).toFixed(2)}</span>
          </div>
        `).join('');

        return `
          <div class="order-card">
            <div class="order-top">
              <div>
                <div class="order-id">Order #${order.id}</div>
                <div class="order-date">${date}</div>
              </div>
              <span class="status-badge status-${order.status}">${order.status}</span>
            </div>
            <div class="order-items">${itemRows}</div>
            <div class="order-footer">
              <span class="order-payment">💳 ${order.paymentMethod || '—'}</span>
              <span class="order-total">Total: $${(order.totalUsd || 0).toFixed(2)}</span>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
